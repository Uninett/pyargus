name: Verify formatting

on:
  push:
    branches: master
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    name: Verify Python formatting
    steps:
    - uses: actions/checkout@v7

    - uses: astral-sh/ruff-action@v4.1.0
      with:
        version: "0.15.10"
        args: "format --check"
